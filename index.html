<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>球球大作战：大逃杀</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <canvas id="game" aria-label="球球大作战大逃杀游戏画布"></canvas>
    <div class="hud top-left">
      <div class="brand">球球大逃杀</div>
      <div id="stats"></div>
    </div>
    <div class="hud top-right">
      <div class="panel-title">排行榜</div>
      <ol id="leaderboard"></ol>
    </div>
    <div class="hud bottom-left">
      <div class="keys">
        <span>鼠标/触摸移动</span>
        <span>Space 分身</span>
        <span>W 吐球</span>
        <span>R 重开</span>
      </div>
    </div>
    <div class="mobile-actions" aria-label="手机操作按钮">
      <button id="mobileEject" class="action secondary" type="button">吐球</button>
      <button id="mobileSplit" class="action primary" type="button">分身</button>
    </div>
    <div id="joystick" class="joystick" aria-label="移动轮盘">
      <div id="joystickKnob" class="joystick-knob"></div>
    </div>
    <div id="toast" class="toast"></div>
    <div id="endScreen" class="end-screen hidden">
      <div class="result" id="resultTitle"></div>
      <button id="restart" type="button">再来一局</button>
    </div>
    <div class="rotate-device" aria-live="polite">
      <div class="phone-icon" aria-hidden="true"></div>
      <div class="rotate-title">请横屏开战</div>
      <div class="rotate-copy">把手机旋转到横屏，视野更大，分身和吐球按钮会出现在右侧。</div>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
